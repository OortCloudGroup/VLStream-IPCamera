server {
    listen       180;
    server_name  localhost;
    root   /home/cat/dist;
    index index.html;
    client_max_body_size 1024m;
    expires 10s;
    location /carema/ {
        # 2. 转发到 HTTPS 后端
        # 注意：这里必须写 https://
        proxy_pass https://192.168.88.98:8443/;

        # --- 3. 关键 SSL 处理配置 ---

        # 如果后台 HTTPS 证书是自签名的（常用情况），必须关闭验证，否则报 502
        proxy_ssl_verify off;

        # 告诉后端真实的访问信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 告诉后端前端其实是通过 HTTP 访问的（如果后端有协议检查需注意）
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- 4. 解决 307 重定向地址纠正 ---
        # 后端如果是 HTTPS，返回 307 时 Location 可能是 https://...
        # 如果你想让浏览器继续通过 http://192.168.88.56:8443 访问，需要替换协议
        proxy_redirect https:// http://;
        }
    }